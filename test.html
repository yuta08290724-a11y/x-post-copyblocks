<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>コピー動作テスト</title>
</head>
<body>
<div class="card-body" id="body">土曜の朝、昨日の酒を体に残したまま出かけてへんか？腸のダメージ、放置したらあかんで。</div>
<button id="copyBtn">コピー</button>
<span id="status"></span>
<script>
document.getElementById('copyBtn').addEventListener('click', function () {
  var text = document.getElementById('body').textContent;
  navigator.clipboard.writeText(text).then(function () {
    document.getElementById('status').textContent = 'コピー成功';
  }).catch(function () {
    document.getElementById('status').textContent = 'コピー失敗';
  });
});
</script>
</body>
</html>
