<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X図解 画像プロンプト</title>
<style>
  :root {
    --bg: #faf7f2;
    --card-bg: #ffffff;
    --text: #2c2c26;
    --sub-text: #6b6b60;
    --green-deep: #3a5a40;
    --green-mid: #588157;
    --orange: #e07a3f;
    --border: #e5ddd0;
    --shadow: 0 2px 10px rgba(58, 90, 64, 0.08), 0 1px 3px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: linear-gradient(180deg, #faf7f2 0%, #f5efe4 100%);
    color: var(--text);
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    line-height: 1.7;
    padding: 20px 12px 60px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  header.page-header {
    background: var(--card-bg);
    border-radius: 18px;
    padding: 20px 20px 18px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  header.page-header h1 { margin: 0 0 6px; font-size: 1.3rem; color: var(--green-deep); letter-spacing: 0.02em; }
  header.page-header .date { font-size: 0.9rem; color: var(--sub-text); margin-bottom: 12px; }
  .rank-line { font-size: 0.85rem; color: var(--text); background: #f0ede3; border-radius: 10px; padding: 10px 12px; line-height: 1.6; }
  .rank-line strong { color: var(--orange); }
  .cards { display: flex; flex-direction: column; gap: 18px; }
  .card { background: var(--card-bg); border-radius: 18px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
  .card.accent-recipe { border-left: 5px solid var(--orange); }
  .card-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; gap: 8px; flex-wrap: wrap; }
  .top-left, .top-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .badge { display: inline-flex; align-items: center; font-size: 0.78rem; font-weight: 700; padding: 5px 10px; border-radius: 999px; white-space: nowrap; }
  .badge-no { background: var(--green-deep); color: #fff; }
  .badge-time { background: #eef2ea; color: var(--green-mid); border: 1px solid #d8e3d3; }
  .badge-score { background: #fdece0; color: var(--orange); border: 1px solid #f6d3ba; }
  .badge-count { background: #f0ede3; color: var(--sub-text); font-weight: 500; }
  .card-body { padding: 4px 16px 16px; white-space: pre-wrap; word-break: break-word; font-size: 0.95rem; line-height: 1.9; color: var(--text); }
  .card-footer { padding: 0 16px 16px; }
  .copy-btn { width: 100%; min-height: 52px; border: none; border-radius: 12px; background: var(--green-mid); color: #fff; font-size: 1rem; font-weight: 700; letter-spacing: 0.03em; cursor: pointer; transition: background-color 0.2s ease, transform 0.1s ease; font-family: inherit; }
  .copy-btn:active { transform: scale(0.98); }
  .copy-btn:hover { background: var(--green-deep); }
  .copy-btn.copied { background: var(--orange); }
  footer.page-footer { text-align: center; font-size: 0.75rem; color: var(--sub-text); margin-top: 24px; }
</style>
</head>
<body>
<div class="wrap">

    <div class="card" data-card="4">

    <div class="card accent-recipe" data-card="5b">
      <div class="card-top">

          <span class="badge badge-no">No.5-②</span>

        </div>
        <div class="top-right">
          <span class="badge badge-score">47点</span>

      </div>

        <button class="copy-btn" data-copy-btn="5b">コピー</button>

    </div>

    <div class="card accent-recipe" data-card="5c">
      <div class="card-top">
        <div class="top-left">
          <span class="badge badge-no">No.5-③</span>
          <span class="badge badge-time">18:00</span>
        </div>
        <div class="top-right">
          <span class="badge badge-score">47点</span>

        </div>
      </div>
      <div class="card-body" data-body="5c"></div>
      <div class="card-footer">
        <button class="copy-btn" data-copy-btn="5c">コピー</button>

    </div>
  </div>
  <footer class="page-footer">タップでコピー → 画像生成AIに貼り付け（シェフ入りは official-chef.jpg を添付）</footer>
</div>

<script>
(function () {
  "use strict";

  var POSTS = {
    "1": `黒背景・白文字・黄色見出し・赤アクセント。横長1600×640（アスペクト比5:2）、広告ポスター風。添付のシェフ画像と同一人物（黒コックコート・コーンロウ・髭・墨絵タッチ）。変更はリアクションのみ、驚いた表情でプロセスチーズと納豆半パックを両手に持つ構図。極太文字で黄色見出し「夜遅く小腹が空いても、我慢するのが正解？」、下部に赤文字で「寝る10分前に少量」。余白広く、主役（食材）を画面中央に最大配置。スマホで0.5秒で理解できるレイアウト。実在商品ロゴ・パッケージは描かない。`,
    "2": `黒背景・白文字・黄色見出し・赤アクセント。横長1600×640（アスペクト比5:2）、広告ポスター風。極太文字の黄色見出し「飲み会翌日の3品」。中央に梅おにぎり・野菜サラダとゆで卵・蒸し鶏サラダの3品を🥉🥈🥇のバッジ付きで縦に配置。下部赤文字で「レジで選ぶだけ」。余白広く主役の食品を最大配置。スマホ0.5秒で理解できるレイアウト。実在商品ロゴ・パッケージは描かず汎用デザインにする。`,
    "3": `黒背景・白文字・黄色見出し・赤アクセント。横長1600×640（アスペクト比5:2）、広告ポスター風。中央にサラダチキンと味付けめかぶパックを並べた構図。極太黄色見出し「サラダチキン単体は片手落ち」。下部赤文字「めかぶを足すだけ」。余白広く主役を最大配置。スマホ0.5秒で理解できるレイアウト。実在商品ロゴ・パッケージは描かず汎用デザインにする。`,
    "4": `黒背景・白文字・黄色見出し・赤アクセント。横長1600×640（アスペクト比5:2）、広告ポスター風。添付のシェフ画像と同一人物（黒コックコート・コーンロウ・髭・墨絵タッチ）。変更はリアクションのみ、少し疲れた表情から穏やかな表情に変わるイメージで、もち麦パックご飯を一口分だけ持つ構図。極太黄色見出し「休みの日、動く気になれんこと、ないか？」。下部赤文字「起きてすぐ一口」。余白広く主役を最大配置。スマホ0.5秒で理解できるレイアウト。`,
    "5a": `生成物：スマホ縦画面用の広告インフォグラフィック、1024×1536の縦長。背景：温かみのあるクリーム色〜ライトベージュの紙質感、フラットデザイン。上部：極太の黒文字で3行の見出し「休日やのに、／体がだるくて動けん。／でも自炊はちょっと億劫。」を左寄せで配置。3行目の「億劫」は黄色マーカーでハイライト。見出し右上に小さな吹き出し「オレガノとレモンで後味さっぱり！」を手書き風フォントで配置。右上にピンクのリボンバナー「コンビニで全部そろう！」を斜めに配置。画面中央〜下部にささみとキムチのオレガノ和えを盛った透明な器の写真をリアルな質感で大きく配置（つやのあるキムチだれ、刻みオクラのねばりが見えるよう）。料理名を写真の下に極太文字で「ささみとキムチの／オレガノ和え」。その下に横並びの黒いアイコンバッジ4つ：時計アイコン「5分」／電子レンジアイコン「レンチン」／包丁に斜線アイコン「包丁なし」／財布アイコン「約350円」。画面右側に縦長の白いカード「材料（1人分）」パネルを配置し、以下4項目をアイコン付きリストで：サラダチキン（プレーン）1パック／キムチ40g／冷凍刻みオクラ大さじ3／【隠し味】ドライオレガノ＋レモン汁小さじ1。最下部にピンクの帯で「作り方は次へ」＋下向き矢印アイコン。書体は極太ゴシック、余白を広く取り、スマホで0.5秒で内容が伝わるレイアウト。実在商品のロゴ・パッケージは描かない。`,
    "5b": `生成物：スマホ縦画面用インフォグラフィック、1024×1536の縦長。背景はパネル①と同じクリーム色。最上部に極太黒文字で大見出し「5分で完成！」、右に小さく「5分」「レンチンだけ」「包丁なし」の3つの独立したテキストバッジを横並び（バッジ同士を記号でつながない）。その下に、縦に3段のステップブロックを配置（各ブロックはピンクの丸数字バッジ＋短い見出し＋工程写真のセット。存在しない工程は追加しない）：①「オクラを20秒レンチン」＋冷凍刻みオクラを耐熱ボウルに入れた写真（600W・20秒の小ラベル付き）②「ほぐしてキムチと和える」＋サラダチキンを手でほぐしキムチと和えている写真③「オレガノとレモンで仕上げ」＋ドライオレガノとレモン汁をかけている写真。各ステップ間に黄色い矢印アイコンで工程の流れを示す。最下部にピンクの帯で「味の理由は次へ」＋下向き矢印アイコン。極太ゴシック体、余白広め、スマホで一瞬で手順がわかるレイアウト。実在商品のロゴ・パッケージは描かない。`,
    "5c": `生成物：スマホ縦画面用インフォグラフィック、1024×1536の縦長。背景はパネル①②と同じクリーム色。最上部に極太黒文字で見出し「なぜ　オレガノ和え？」、その下にピンクの帯で「さっぱりなのに、満足感しっかり。」見出し下に縦に4項目の理由リスト（各項目：丸いアイコン＋太字キーワード＋説明1行）：キムチの発酵酸味＝乳酸菌の酸味で食欲をリセット／サラダチキンのたんぱく質＝高たんぱくで満足感しっかり／オクラのねばり＝食物繊維で腹持ちアップ／オレガノ＆レモンの香り＝イタリアンの後味ですっきり。画面中央にささみとキムチのオレガノ和えの完成写真を大きく配置。画面右側に添付のシェフ画像と同一人物（黒コックコート・コーンロウ・髭・墨絵タッチ）を配置。変更はリアクションのみ、腕組みで自信ありげな表情、吹き出しで「休日のご褒美に！」。写真の下に黒背景の小さな注意書きボックスを2つ並べる：「弱点：これだけでは野菜がやや少なめ。」／「足すなら：冷凍ブロッコリーかミニトマトを追加。副菜にもおすすめ！」最下部に赤い帯で白文字「保存して、休日のご褒美に使ってな！」＋しおりアイコン。極太ゴシック体、余白広め、スマホで一瞬で内容が伝わるレイアウト。実在商品のロゴ・パッケージは描かない。`
  };

  Object.keys(POSTS).forEach(function (key) {
    var text = POSTS[key];
    var bodyEl = document.querySelector('[data-body="' + key + '"]');
    var countEl = document.querySelector('[data-count-for="' + key + '"]');
    if (bodyEl) bodyEl.textContent = text;
    if (countEl) countEl.textContent = text.length + "字";
  });

  function copyText(text) {
    return new Promise(function (resolve, reject) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(resolve).catch(function () {
          fallbackCopy(text) ? resolve() : reject(new Error("fallback copy failed"));
        });
      } else {
        fallbackCopy(text) ? resolve() : reject(new Error("fallback copy failed"));
      }
    });
  }

  function fallbackCopy(text) {
    var textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.style.position = "fixed";
    textarea.style.top = "0";
    textarea.style.left = "0";
    textarea.style.width = "1px";
    textarea.style.height = "1px";
    textarea.style.padding = "0";
    textarea.style.border = "none";
    textarea.style.outline = "none";
    textarea.style.boxShadow = "none";
    textarea.style.background = "transparent";
    textarea.style.opacity = "0";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();
    textarea.setSelectionRange(0, textarea.value.length);
    var success = false;
    try { success = document.execCommand("copy"); } catch (err) { success = false; }
    document.body.removeChild(textarea);
    return success;
  }

  document.querySelectorAll(".copy-btn").forEach(function (btn) {
    var key = btn.getAttribute("data-copy-btn");
    btn.addEventListener("click", function () {
      var text = POSTS[key];
      if (!text) return;
      copyText(text).then(function () {
        showCopied(btn);
      }).catch(function () {
        btn.textContent = "コピー失敗";
        setTimeout(function () { btn.textContent = "コピー"; }, 1500);
      });
    });
  });

  function showCopied(btn) {
    btn.textContent = "✓ コピーしました";
    btn.classList.add("copied");
    setTimeout(function () {
      btn.textContent = "コピー";
      btn.classList.remove("copied");
    }, 1500);
  }
})();
</script>
