<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X図解 画像プロンプト</title>
<style>
  :root {
    --bg: #faf7f2;
    --card-bg: #ffffff;
    --text: #2c2c26;
    --sub-text: #6b6b60;
    --green-deep: #3a5a40;
    --green-mid: #588157;
    --orange: #e07a3f;
    --border: #e5ddd0;
    --shadow: 0 2px 10px rgba(58, 90, 64, 0.08), 0 1px 3px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: linear-gradient(180deg, #faf7f2 0%, #f5efe4 100%);
    color: var(--text);
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    line-height: 1.7;
    padding: 20px 12px 60px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  header.page-header {
    background: var(--card-bg);
    border-radius: 18px;
    padding: 20px 20px 18px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  header.page-header h1 { margin: 0 0 6px; font-size: 1.3rem; color: var(--green-deep); letter-spacing: 0.02em; }
  header.page-header .date { font-size: 0.9rem; color: var(--sub-text); margin-bottom: 12px; }
  .rank-line { font-size: 0.85rem; color: var(--text); background: #f0ede3; border-radius: 10px; padding: 10px 12px; line-height: 1.6; }
  .rank-line strong { color: var(--orange); }
  .cards { display: flex; flex-direction: column; gap: 18px; }
  .card { background: var(--card-bg); border-radius: 18px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
  .card.accent-recipe { border-left: 5px solid var(--orange); }
  .card-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; gap: 8px; flex-wrap: wrap; }
  .top-left, .top-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .badge { display: inline-flex; align-items: center; font-size: 0.78rem; font-weight: 700; padding: 5px 10px; border-radius: 999px; white-space: nowrap; }
  .badge-no { background: var(--green-deep); color: #fff; }
  .badge-time { background: #eef2ea; color: var(--green-mid); border: 1px solid #d8e3d3; }
  .badge-score { background: #fdece0; color: var(--orange); border: 1px solid #f6d3ba; }
  .badge-count { background: #f0ede3; color: var(--sub-text); font-weight: 500; }
  .card-body { padding: 4px 16px 16px; white-space: pre-wrap; word-break: break-word; font-size: 0.95rem; line-height: 1.9; color: var(--text); }
  .card-footer { padding: 0 16px 16px; }
  .copy-btn { width: 100%; min-height: 52px; border: none; border-radius: 12px; background: var(--green-mid); color: #fff; font-size: 1rem; font-weight: 700; letter-spacing: 0.03em; cursor: pointer; transition: background-color 0.2s ease, transform 0.1s ease; font-family: inherit; }
  .copy-btn:active { transform: scale(0.98); }
  .copy-btn:hover { background: var(--green-deep); }
  .copy-btn.copied { background: var(--orange); }
  footer.page-footer { text-align: center; font-size: 0.75rem; color: var(--sub-text); margin-top: 24px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="page-header">
    <h1>X図解 画像プロンプト</h1>
    <div class="date">2026-07-22</div>
    <div class="rank-line">推奨順位　<strong>1位=No.4</strong> / 2位=No.1 / 3位=No.2 / 4位=No.3 / 5位=No.5</div>
  </header>
  <div class="cards">
    <div class="card" data-card="1">
      <div class="card-top">
        <div class="top-left">
          <span class="badge badge-no">No.1</span>

        </div>
        <div class="top-right">
          <span class="badge badge-score">50点</span>

        </div>
      </div>
      <div class="card-body" data-body="1"></div>
      <div class="card-footer">
        <button class="copy-btn" data-copy-btn="1">コピー</button>
      </div>
    </div>

    <div class="card" data-card="2">
      <div class="card-top">

          <span class="badge badge-no">No.2</span>

        </div>

          <span class="badge badge-score">50点</span>

      <div class="card-body" data-body="2"></div>

    </div>

    <div class="card" data-card="3">
      <div class="card-top">
        <div class="top-left">

        </div>
        <div class="top-right">
          <span class="badge badge-score">50点</span>
          <span class="badge badge-count" data-count-for="3">0字</span>
        </div>
      </div>
      <div class="card-body" data-body="3"></div>
      <div class="card-footer">
        <button class="copy-btn" data-copy-btn="3">コピー</button>
      </div>
    </div>

    <div class="card" data-card="4">
      <div class="card-top">
        <div class="top-left">
          <span class="badge badge-no">No.4</span>
          <span class="badge badge-time">19:00</span>
        </div>
        <div class="top-right">
          <span class="badge badge-score">50点</span>
          <span class="badge badge-count" data-count-for="4">0字</span>

      </div>
      <div class="card-body" data-body="4"></div>
      <div class="card-footer">
        <button class="copy-btn" data-copy-btn="4">コピー</button>

    <div class="card accent-recipe" data-card="5a">
      <div class="card-top">
        <div class="top-left">
          <span class="badge badge-no">No.5-①</span>
          <span class="badge badge-time">18:00</span>
        </div>
        <div class="top-right">
          <span class="badge badge-score">45点</span>
          <span class="badge badge-count" data-count-for="5a">0字</span>
        </div>
      </div>
      <div class="card-body" data-body="5a"></div>
      <div class="card-footer">
        <button class="copy-btn" data-copy-btn="5a">コピー</button>
      </div>
    </div>

    <div class="card accent-recipe" data-card="5b">
      <div class="card-top">
        <div class="top-left">
          <span class="badge badge-no">No.5-②</span>
          <span class="badge badge-time">18:00</span>
        </div>
        <div class="top-right">
          <span class="badge badge-score">45点</span>
          <span class="badge badge-count" data-count-for="5b">0字</span>
        </div>
      </div>
      <div class="card-body" data-body="5b"></div>
      <div class="card-footer">
        <button class="copy-btn" data-copy-btn="5b">コピー</button>
      </div>
    </div>

    <div class="card accent-recipe" data-card="5c">
      <div class="card-top">
        <div class="top-left">
          <span class="badge badge-no">No.5-③</span>
          <span class="badge badge-time">18:00</span>
        </div>
        <div class="top-right">
          <span class="badge badge-score">45点</span>
          <span class="badge badge-count" data-count-for="5c">0字</span>
        </div>
      </div>
      <div class="card-body" data-body="5c"></div>
      <div class="card-footer">
        <button class="copy-btn" data-copy-btn="5c">コピー</button>
      </div>
    </div>
  </div>
  <footer class="page-footer">タップでコピー → 画像生成AIに貼り付け（シェフ入りは official-chef.jpg を添付）</footer>
</div>

<script>
(function () {
  "use strict";

  var POSTS = {
    "1": `黒背景・白文字・黄色見出し・赤アクセントの広告ポスター風デザイン。横長1600×640(アスペクト比5:2)。極太ゴシック文字、余白広く、スマホ0.5秒で理解できる構成。
見出し（黄色・極太）：「お腹の張り、歳のせいで諦めてへんか？」
サブ要点（白文字）：「主食をオーツ麦配合ロールパンに変えるだけ」
中央〜下に湯気立つロールパンと腸のイメージを抽象的に描いた主役ビジュアルを最大サイズで配置。赤アクセントで小さく「原材料表示チェック」の一言を添える。実在商品のロゴ・パッケージは描かない。`,
    "2": `黒背景・白文字・黄色見出し・赤アクセントの広告ポスター風デザイン。横長1600×640(アスペクト比5:2)。極太ゴシック文字、余白広く、スマホ0.5秒で理解できる構成。
見出し（黄色・極太）：「週末運動後、気合いだけで乗り切ろうとしてへんか？」
ランキング要素を3段で配置：🥉もずく酢／🥈無糖ヨーグルト／🥇サラダチキン＋わかめスープ（各アイコン風イラストで表現、文字は最小限）。
右下に赤帯で「疲労回復は筋肉だけの話やない」の一言。実在商品のロゴ・パッケージは描かない。`,
    "3": `黒背景・白文字・黄色見出し・赤アクセントの広告ポスター風デザイン。横長1600×640(アスペクト比5:2)。極太ゴシック文字、余白広く、スマホ0.5秒で理解できる構成。
見出し（黄色・極太）：「そのコンビニパスタ、買ってすぐチンしてへんか？」
サブ要点（白文字）：「一度冷ましてから温め直すと血糖にやさしいらしい」
中央に湯気立つパスタパウチと電子レンジのシンプルなアイコンを主役ビジュアルとして最大サイズで配置。赤アクセントで「ファミマの冷蔵パスタで試す」の一言。実在商品のロゴ・パッケージは描かない。`,
    "4": `黒背景・白文字・黄色見出し・赤アクセントの広告ポスター風デザイン。横長1600×640(アスペクト比5:2)。極太ゴシック文字、余白広く、スマホ0.5秒で理解できる構成。
見出し（黄色・極太）：「ペットボトルの蓋、一瞬手こずったことないか？」
サブ要点（白文字）：「筋肉だけやない、腸の話かもしれん」
中央にペットボトルのキャップを開けようとする手の抽象イラストを主役ビジュアルとして最大サイズで配置。赤アクセントで「続きはツリーで」の一言。実在商品のロゴ・パッケージは描かない。`,
    "5a": `クリーム色〜ライトベージュの紙質感フラットデザイン。縦長1024×1536。極太ゴシック、余白広く、スマホ0.5秒理解。
3行見出し（1語を黄色マーカーでハイライト）：「運動終わりに／握力の衰え／感じてる人へ」
手書き風の小吹き出しサブコピー：「5分で発酵と海藻を一気に」
右上にピンクのリボンで「コンビニで全部そろう！」
完成した蒸し鶏ともずく酢の甘酒バジル和えの写真を中央〜下に大きく配置。
料理名を極太文字：「蒸し鶏ともずく酢の甘酒バジル和え」
時短4バッジ：5分／レンジのみ／包丁なし／350円目安
右側に「材料（1人分）」パネル：サラダチキン・もずく酢・刻み昆布・甘酒・乾燥バジル（隠し味）をアイコン付きリストで表示
最下部に「作り方は次へ」`,
    "5b": `クリーム色〜ライトベージュの紙質感フラットデザイン。縦長1024×1536。極太ゴシック、余白広く、スマホ0.5秒理解。
大見出し：「5分で完成！」＋時短4バッジ再掲（5分／レンジのみ／包丁なし／350円目安）
手順を縦に3ステップで並べる（水増しせず実際の手順数のまま）：
①レンジ600Wで20秒サラダチキンを温める（工程写真）
②手で大きめにほぐす（工程写真）
③もずく酢・刻み昆布・甘酒・バジルを加えて和える（工程写真）
各ステップに丸数字バッジ＋短い見出し。
最下部に「味の理由は次へ」`,
    "5c": `クリーム色〜ライトベージュの紙質感フラットデザイン。縦長1024×1536。極太ゴシック、余白広く、スマホ0.5秒理解。
見出し：「なぜ　蒸し鶏ともずく酢の甘酒バジル和え？」
サブコピー：「発酵×食物繊維を一度に」
完成写真を中央に配置。
理由リスト4項目（本文のロジックから作成、効能の誇張・出典未確認の数値は禁止）：
・甘酒の発酵パワーともずく・昆布の食物繊維をセットで摂れる
・バジルの香りが甘酒の甘さと海藻の磯っぽさをまとめる
・レンジ20秒だけで包丁不要、5分で完成
・高タンパクなサラダチキンで運動後の材料補給にもなる
弱点＋足すなら提案ボックス：「弱点：野菜がもずく・昆布だけでやや単調／足すなら：ミニトマトを刻んで彩りと酸味をプラス」
最下部に赤帯で保存CTA：「疲れた体に、まず一皿。保存しといてくれ」`
  };

  Object.keys(POSTS).forEach(function (key) {
    var text = POSTS[key];
    var bodyEl = document.querySelector('[data-body="' + key + '"]');
    var countEl = document.querySelector('[data-count-for="' + key + '"]');
    if (bodyEl) bodyEl.textContent = text;
    if (countEl) countEl.textContent = text.length + "字";
  });

  function copyText(text) {
    return new Promise(function (resolve, reject) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(resolve).catch(function () {
          fallbackCopy(text) ? resolve() : reject(new Error("fallback copy failed"));
        });
      } else {
        fallbackCopy(text) ? resolve() : reject(new Error("fallback copy failed"));
      }
    });
  }

  function fallbackCopy(text) {
    var textarea = document.createElement("textarea");
    textarea.value = text;
    textarea.style.position = "fixed";
    textarea.style.top = "0";
    textarea.style.left = "0";
    textarea.style.width = "1px";
    textarea.style.height = "1px";
    textarea.style.padding = "0";
    textarea.style.border = "none";
    textarea.style.outline = "none";
    textarea.style.boxShadow = "none";
    textarea.style.background = "transparent";
    textarea.style.opacity = "0";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();
    textarea.setSelectionRange(0, textarea.value.length);
    var success = false;
    try { success = document.execCommand("copy"); } catch (err) { success = false; }
    document.body.removeChild(textarea);
    return success;
  }

  document.querySelectorAll(".copy-btn").forEach(function (btn) {
    var key = btn.getAttribute("data-copy-btn");
    btn.addEventListener("click", function () {
      var text = POSTS[key];
      if (!text) return;
      copyText(text).then(function () {
        showCopied(btn);
      }).catch(function () {
        btn.textContent = "コピー失敗";
        setTimeout(function () { btn.textContent = "コピー"; }, 1500);
      });
    });
  });

  function showCopied(btn) {
    btn.textContent = "✓ コピーしました";
    btn.classList.add("copied");
    setTimeout(function () {
      btn.textContent = "コピー";
      btn.classList.remove("copied");
    }, 1500);
  }
})();
</script>
</body>
</html>
